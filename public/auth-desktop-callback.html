<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Return to GamePlay · Desktop</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #0a0a0a; color: #fafafa; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { max-width: 28rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 0.75rem; padding: 1.5rem; background: #141414; }
    h1 { font-size: 1.125rem; margin: 0 0 0.5rem; font-weight: 600; }
    p { margin: 0; font-size: 0.875rem; line-height: 1.5; color: rgba(250,250,250,0.75); }
    .btn { display: inline-block; margin-top: 1rem; padding: 0.5rem 1rem; border: 1px solid rgba(255,255,255,0.15); border-radius: 0.375rem; color: #fafafa; text-decoration: none; font-size: 0.875rem; }
    .btn:hover { background: rgba(255,255,255,0.06); }
    #wait { margin-top: 1rem; font-size: 0.75rem; color: rgba(250,250,250,0.55); }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Opening GamePlay desktop…</h1>
    <p id="desc">If the app does not open automatically, use the button below. When the desktop app shows you’re signed in, you can close this tab — it does not need to stay open.</p>
    <p id="wait">Waiting for handoff…</p>
    <a id="open" class="btn" href="#" style="display:none">Open GamePlay desktop</a>
    <p style="margin-top:1.25rem;font-size:0.75rem;color:rgba(250,250,250,0.55)">
      <a href="/auth/sign-in" style="color:#a3a3a3">Sign in on the web</a>
    </p>
  </div>
  <script>
    (function () {
      var q = window.location.search || "";
      var h = window.location.hash || "";
      var target = "gameplay://auth/callback" + q + h;
      var a = document.getElementById("open");
      var w = document.getElementById("wait");
      var title = document.getElementById("title");
      var desc = document.getElementById("desc");
      if (a) a.setAttribute("href", target);
      try {
        history.replaceState(null, "", window.location.pathname);
      } catch (e) {}
      try {
        window.location.replace(target);
      } catch (e) {}
      window.setTimeout(function () {
        if (w) w.style.display = "none";
        if (a) a.style.display = "inline-block";
        if (title) title.textContent = "Return to the desktop app";
        if (desc) desc.textContent = "If GamePlay opened and you’re signed in there, you can close this browser tab. If not, use the button above to open the app again.";
      }, 700);
    })();
  </script>
</body>
</html>
